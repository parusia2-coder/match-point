<!DOCTYPE html>
<html lang="ko">
<head>
  ${commonHead}
  <title>📅 대회 전체 타임라인</title>
  <meta name="description" content="전 코트 경기 진행 타임라인">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; transition: var(--transition); }
    .timeline-header { text-align: center; padding: 30px 0; }
    .timeline-header h1 { font-size: 2.2rem; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-weight: 800; }
    .filter-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; background: var(--bg-card); padding: 12px; border-radius: 24px; border: 1px solid var(--border); width: fit-content; margin-inline: auto; backdrop-filter: blur(8px); }
    .filter-btn { padding: 8px 24px; border-radius: 20px; border: 1px solid transparent; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .filter-btn:hover:not(.active) { color: var(--text-primary); background: var(--border); }
    .filter-btn.active { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3); }
    .timeline-container { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; perspective: 1000px; }
    .court-lane { display: flex; align-items: stretch; gap: 16px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transform-origin: left center; animation: slideIn 0.5s backwards; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .court-lane:nth-child(even) { background: var(--bg-secondary); }
    .court-label { width: 80px; padding: 16px 12px; text-align: center; font-weight: 700; color: #c084fc; flex-shrink: 0; font-size: 0.95rem; background: rgba(139, 92, 246, 0.1); border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .court-matches { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; padding: 12px; min-height: 60px; }
    .match-cell { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; border: 1px solid var(--border); }
    .match-cell:hover { transform: scale(1.4) translateY(-5px); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); }
    .match-cell.pending { background: rgba(71,85,105,0.4); color: #cbd5e1; }
    .match-cell.playing { background: rgba(16,185,129,0.2); color: #34d399; border-color: rgba(16,185,129,0.4); animation: pulseCell 2s infinite; }
    .match-cell.completed { background: rgba(56,189,248,0.2); color: #7dd3fc; border-color: rgba(56,189,248,0.3); }
    @keyframes pulseCell { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.3); } 70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
    .tooltip { display: none; position: fixed; background: var(--bg-card-hover); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; font-size: 0.9rem; z-index: 1000; min-width: 200px; max-width: 300px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6); backdrop-filter: blur(8px); pointer-events: none; transition: opacity 0.2s; color: var(--text-primary); }
    .tooltip strong { color: #f472b6; font-size: 1.05rem; display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; }
    .tooltip.show { display: block; animation: fadeTooltip 0.2s ease-out; }
    @keyframes fadeTooltip { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .refresh-note { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 40px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .refresh-note::before { content: ''; width: 6px; height: 6px; background: #c084fc; border-radius: 50%; opacity: 0.8; }
  </style>
</head>
<body>
  <nav style="display:flex; justify-content:flex-start; margin-bottom:10px; max-width:1400px; margin-inline:auto; padding:0 20px;">
    <a href="/" id="homeBtn" style="color: var(--text-muted); text-decoration:none; font-weight:600; font-size:0.95rem; display:flex; align-items:center; gap:8px; background:var(--border); padding:8px 16px; border-radius:20px; transition:all 0.2s ease; border:1px solid var(--border); width:fit-content;">
      <span style="font-size:1.1rem">🛖</span> 메인 홈으로 이동
    </a>
  </nav>
  <div class="timeline-header" style="padding-top:10px;">
    <h1>🏸 코트별 타임라인</h1>
    <div style="margin-top:12px;">
      <select id="venueSelect" onchange="changeVenue()" style="padding:10px 20px; border-radius:12px; background:var(--bg-secondary); color: var(--text-primary); border:1px solid rgba(255,255,255,0.1); font-size:0.95rem; font-weight:600; cursor:pointer; min-width:200px;">
        <option value="">전체 경기장</option>
      </select>
    </div>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all">전체</button>
    <button class="filter-btn" data-cat="md">남복</button>
    <button class="filter-btn" data-cat="wd">여복</button>
    <button class="filter-btn" data-cat="xd">혼복</button>
  </div>
  <div class="timeline-container" id="timeline"></div>
  <div class="tooltip" id="tooltip"></div>
  <div class="refresh-note">20초마다 자동 갱신됩니다</div>

  <script>
    const params = new URLSearchParams(location.search);
    const tid = params.get('tid') || '1';
    let allData = null;
    let currentFilter = 'all';
    let currentVenue = params.get('venue_id') || '';
    
    document.getElementById('homeBtn').href = '/?tid=' + tid;
    if (currentVenue) document.getElementById('venueSelect').value = currentVenue;

    window.changeVenue = function() {
      currentVenue = document.getElementById('venueSelect').value;
      loadTimeline();
    };

    document.getElementById('filterBar').addEventListener('click', function(e) {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.cat;
        renderTimeline();
      }
    });

    async function loadTimeline() {
      try {
        var venueParam = currentVenue ? '?venue_id=' + currentVenue : '';
        const res = await fetch('/api/tournaments/' + tid + '/timeline' + venueParam);
        allData = await res.json();

        // Populate venue selector
        if (allData.venues && allData.venues.length > 0) {
          var sel = document.getElementById('venueSelect');
          var curVal = currentVenue;
          sel.innerHTML = '<option value="">전체 경기장</option>' + 
            allData.venues.map(function(v) {
              return '<option value="' + v.id + '"' + (curVal == v.id ? ' selected' : '') + '>' + v.name + ' (' + v.courts_count + '코트)</option>';
            }).join('');
        }

        renderTimeline();
      } catch(e) { console.error(e); }
    }

    function renderTimeline() {
      if (!allData) return;
      const container = document.getElementById('timeline');
      let html = '';
      const matches = currentFilter === 'all' ? allData.matches : allData.matches.filter(m => m.ec === currentFilter);

      for (let court = 1; court <= allData.courts; court++) {
        const courtMatches = matches.filter(m => m.c === court);
        html += '<div class="court-lane"><div class="court-label">코트 ' + court + '</div><div class="court-matches">';
        courtMatches.forEach(function(m) {
          var label = '';
          if (m.s === 'completed' || m.s === 'playing') {
            label = (m.team1_set1||0)+'-'+(m.team2_set1||0);
          } else if (m.st) {
            label = m.st;
          }
          var cellStyle = m.st && m.s === 'pending' ? 'font-size:0.6rem;' : '';
          html += '<div class="match-cell ' + m.s + '" style="' + cellStyle + '" data-id="' + m.id + '" data-n1="' + (m.n1||'TBD') + '" data-n2="' + (m.n2||'TBD') + '" data-en="' + (m.en||'') + '" data-s="' + m.s + '" data-st="' + (m.st||'') + '" data-score="' + 
            [(m.team1_set1||0),(m.team1_set2||0),(m.team1_set3||0)].join('-') + ':' + [(m.team2_set1||0),(m.team2_set2||0),(m.team2_set3||0)].join('-') +
            '">' + label + '</div>';
        });
        html += '</div></div>';
      }
      container.innerHTML = html;
    }

    // Event-delegated tooltip
    const tooltip = document.getElementById('tooltip');
    document.getElementById('timeline').addEventListener('mouseover', function(e) {
      const cell = e.target.closest('.match-cell');
      if (!cell) return;
      const statusLabel = { pending: '대기', playing: '진행중', completed: '완료' }[cell.dataset.s] || '';
      var timeInfo = cell.dataset.st ? '<div style="color:#c084fc;font-weight:700;margin-bottom:4px;">🕐 ' + cell.dataset.st + '</div>' : '';
      tooltip.innerHTML = '<strong>' + cell.dataset.en + '</strong>' + timeInfo +
        '<div style="margin: 8px 0; line-height: 1.5;">' + cell.dataset.n1 + '<br><span style="color: var(--text-muted);font-size:0.8rem">vs</span><br>' + cell.dataset.n2 + '</div>' + 
        '<div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;"><span style="color:#38bdf8;font-weight:700;background:rgba(56,189,248,0.1);padding:2px 8px;border-radius:12px;">' + statusLabel + '</span>' +
        (cell.dataset.s !== 'pending' ? '<span style="font-family:monospace;font-size:1.1rem;font-weight:800;">' + cell.dataset.score + '</span>' : '') + '</div>';
      tooltip.classList.add('show');
      const rect = cell.getBoundingClientRect();
      const left = rect.left + window.scrollX;
      tooltip.style.left = Math.min(left, window.innerWidth - 320) + 'px';
      tooltip.style.top = (rect.bottom + window.scrollY + 12) + 'px';
    });
    document.addEventListener('mouseout', function(e) {
      if (e.target.closest('.match-cell')) tooltip.classList.remove('show');
    });

    // WebSocket Live Updates
    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(protocol + '//' + location.host + '/api/live/' + tid + '/ws');
      ws.onmessage = (e) => {
          if (e.data === 'pong') return;
          try {
              const data = JSON.parse(e.data);
              if (data.type === 'update') loadTimeline();
          } catch(err) {}
      };
      ws.onclose = () => setTimeout(connectWebSocket, 5000);
      setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 30000);
    }

    loadTimeline();
    connectWebSocket();
    setInterval(loadTimeline, 60000); // Fallback
  </script>
</body>
</html>
