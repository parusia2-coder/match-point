<!DOCTYPE html>
<html lang="ko">
<head>
  ${commonHead}
  <title>👤 나의 경기 현황</title>
  <meta name="description" content="실시간 내 경기 일정 및 진행 현황 안내">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap');
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Outfit', 'Pretendard', sans-serif; margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; transition: var(--transition); }
    .my-container { width: 100%; max-width: 600px; }
    .sponsor-banner-mobile { margin-bottom: 30px; padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; text-align: center; color: #fbbf24; font-weight: 600; font-size: 0.95rem; backdrop-filter: blur(8px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
    .sponsor-banner-mobile::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: shine 3s infinite; }
    @keyframes shine { 100% { left: 200%; } }
    .my-header { text-align: center; padding: 10px 0 30px 0; }
    .my-header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; letter-spacing: -0.5px; }
    .search-form { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    .search-form input { flex: 1; min-width: 140px; padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-secondary); color: #fff; font-size: 1.05rem; font-family: inherit; backdrop-filter: blur(8px); transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
    .search-form input::placeholder { color: var(--text-muted); font-weight: 400; }
    .search-form input:focus { outline: none; border-color: #f59e0b; background: var(--bg-secondary); box-shadow: 0 0 0 4px rgba(245,158,11,0.1), inset 0 2px 4px rgba(0,0,0,0.2); }
    .search-form button { padding: 16px 32px; background: linear-gradient(135deg, #f59e0b, #ef4444); background-size: 200% auto; border: none; border-radius: 16px; color: #fff; font-weight: 700; font-size: 1.05rem; cursor: pointer; white-space: nowrap; box-shadow: 0 10px 20px -5px rgba(239,68,68,0.4); transition: all 0.3s ease; }
    .search-form button:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 15px 25px -5px rgba(239,68,68,0.5); }
    .search-form button:active { transform: translateY(0); }
    .match-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 20px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); animation: slideUp 0.4s backwards; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .match-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.1); background: var(--bg-card); }
    .match-status { align-self: flex-start; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; margin-bottom: 16px; letter-spacing: 0.5px; }
    .status-playing { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); animation: pulseAlert 2s infinite; }
    @keyframes pulseAlert { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
    .status-pending { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .status-completed { background: rgba(100,116,139,0.2); color: var(--text-muted); border: 1px solid rgba(100,116,139,0.3); }
    .match-teams { font-size: 1.3rem; font-weight: 700; margin: 0 0 16px 0; line-height: 1.6; color: var(--text-primary); }
    .match-teams .vs { color: var(--text-muted); font-size: 1rem; font-weight: 500; margin: 4px 0; display: inline-block; }
    .match-meta { font-size: 0.9rem; color: var(--text-muted); display: flex; gap: 16px; font-weight: 500; background: rgba(0,0,0,0.2); padding: 12px 16px; border-radius: 12px; }
    .match-meta span { display: flex; align-items: center; gap: 6px; }
    .match-score { color: var(--text-primary); font-weight: 800; font-size: 1.8rem; margin-top: 20px; letter-spacing: 2px; text-align: center; background: linear-gradient(135deg, #06b6d4, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .push-section { background: rgba(245,158,11,0.05); border: 1px solid rgba(245,158,11,0.2); border-radius: 20px; padding: 24px; margin-bottom: 30px; text-align: center; backdrop-filter: blur(8px); animation: slideUp 0.5s ease; }
    .push-btn { padding: 14px 28px; background: linear-gradient(135deg, #f59e0b, #ef4444); border: none; border-radius: 16px; color: #fff; font-weight: 700; cursor: pointer; margin-top: 16px; font-size: 1rem; box-shadow: 0 8px 16px -4px rgba(245,158,11,0.4); transition: all 0.3s; }
    .push-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -4px rgba(245,158,11,0.5); }
    .no-results { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 1.15rem; background: var(--bg-card); border-radius: 20px; border: 1px dashed rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="my-container">
    <div class="sponsor-banner-mobile" id="mobileSponsor">💡 안양시 배드민턴 협회 | 언제나 즐거운 스포츠 라이프</div>
    
    <nav style="display:flex; justify-content:flex-start; margin-bottom:20px;">
      <a href="/" id="homeBtn" style="color: var(--text-muted); text-decoration:none; font-weight:600; font-size:0.95rem; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:8px 16px; border-radius:20px; transition:all 0.2s ease; border: 1px solid var(--border);">
        <span style="font-size:1.1rem">🛖</span> 메인 홈으로 이동
      </a>
    </nav>
    
    <div class="my-header">
      <h1>🏸 내 경기 확인</h1>
      <p style="color: var(--text-muted);font-size:0.95rem;margin-top:8px">이름과 연락처로 내 경기를 검색하세요</p>
    </div>
    <div class="search-form">
      <input type="text" id="nameInput" placeholder="이름">
      <input type="text" id="phoneInput" placeholder="연락처 (선택)">
      <button onclick="searchMatches()">검색</button>
    </div>
    <div class="push-section" id="pushSection" style="display:none">
      <p style="font-size:0.85rem;color:#f59e0b">🔔 경기 시작 알림을 받으시겠습니까?</p>
      <button class="push-btn" id="pushBtn" onclick="togglePush()">알림 받기</button>
    </div>
    <div id="participantInfo"></div>
    <div id="matchList"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const tid = params.get('tid') || '1';
    let currentName = '';
    
    document.getElementById('homeBtn').href = '/?tid=' + tid;

    async function searchMatches() {
      const name = document.getElementById('nameInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();
      if (!name) return alert('이름을 입력해주세요');
      currentName = name;

      try {
        const res = await fetch('/api/tournaments/' + tid + '/my-matches?name=' + encodeURIComponent(name) + (phone ? '&phone=' + encodeURIComponent(phone) : ''));
        const data = await res.json();
        if (!data.matches || data.matches.length === 0) {
          document.getElementById('matchList').innerHTML = '<div class="no-results">😔 경기를 찾을 수 없습니다</div>';
          return;
        }

        document.getElementById('pushSection').style.display = 'block';

        const p = data.participant;
        const qrData = JSON.stringify({tid: tid, pid: p.id});
        const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(qrData) + '&color=10b981&bgcolor=0f172a';
        
        document.getElementById('participantInfo').innerHTML = 
          '<div style="background: var(--bg-card);border: 1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:24px;text-align:center;backdrop-filter:blur(12px);box-shadow:0 10px 25px -5px rgba(0,0,0,0.5);">' +
            '<div style="font-size:1.2rem;font-weight:800;color: var(--text-primary);margin-bottom:8px;">' + p.name + ' <span style="font-size:0.9rem;color: var(--text-muted);font-weight:500;">/ ' + (p.club||'소속없음') + '</span></div>' +
            '<div style="display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.85rem;font-weight:700;margin-bottom:16px;' + 
               (p.checked_in ? 'background:rgba(16,185,129,0.2);color:#34d399;">✅ 체크인 완료' : 'background:rgba(239,68,68,0.2);color:#fca5a5;">❌ 미체크인') + 
            '</div>' +
            '<div style="background:#fff;padding:8px;border-radius:12px;display:inline-block;margin:0 auto;">' +
              '<img src="' + qrUrl + '" alt="QR Code" style="width:150px;height:150px;display:block;">' +
            '</div>' +
            '<p style="color: var(--text-muted);font-size:0.8rem;margin-top:12px;">현장 도착 시 본부석에 이 QR코드를 보여주세요.</p>' +
          '</div>';

        document.getElementById('matchList').innerHTML = data.matches.map(function(m) {
          const statusClass = 'status-' + m.status;
          const statusLabel = m.status === 'playing' ? '진행중' : m.status === 'pending' ? '예정' : '완료';
          const t1 = m.team1_name || (m.t1p1_name + ' · ' + m.t1p2_name);
          const t2 = m.team2_name || (m.t2p1_name + ' · ' + m.t2p2_name);
          const score = m.status === 'completed' || m.status === 'playing' ? 
            '<div class="match-score">' + [m.team1_set1||0,m.team1_set2||0,m.team1_set3||0].join('-') + ' : ' + [m.team2_set1||0,m.team2_set2||0,m.team2_set3||0].join('-') + '</div>' : '';
          return '<div class="match-card"><span class="match-status ' + statusClass + '">' + statusLabel + '</span>' +
            '<div class="match-teams">' + t1 + '<br><span class="vs">vs</span><br>' + t2 + '</div>' +
            '<div class="match-meta"><span>🏟 코트 ' + (m.court_number||'-') + '</span><span>📋 ' + (m.event_name||'') + '</span></div>' +
            score + '</div>';
        }).join('');
      } catch(e) { alert('오류: ' + e.message); }
    }

    // Simple push toggle (placeholder)
    async function togglePush() {
      alert('푸시 알림 기능은 HTTPS 환경에서만 동작합니다.');
    }

    // Auto-refresh via WebSocket and fallback
    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(protocol + '//' + location.host + '/api/live/' + tid + '/ws');
      ws.onmessage = (e) => {
          if (e.data === 'pong') return;
          try {
              const data = JSON.parse(e.data);
              if (data.type === 'update' && currentName) searchMatches();
          } catch(err) {}
      };
      ws.onclose = () => setTimeout(connectWebSocket, 5000);
      setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 30000);
    }
    connectWebSocket();
    setInterval(function() { if (currentName) searchMatches(); }, 30000);

    // Sponsor Banner Rolling
    const sponsorsMobile = [
      "💡 공식 파트너: 스마트 스포츠",
      "👟 이벤트: 최고급 셔틀콕 무료 증정",
      "🥤 경기 전 필수! 파워업 드링크"
    ];
    let mobIdx = 0;
    setInterval(() => {
      mobIdx = (mobIdx + 1) % sponsorsMobile.length;
      const el = document.getElementById('mobileSponsor');
      if(el) {
        el.style.opacity = 0;
        setTimeout(() => {
          el.textContent = sponsorsMobile[mobIdx];
          el.style.opacity = 1;
        }, 300);
      }
    }, 4500);
  </script>
</body>
</html>
